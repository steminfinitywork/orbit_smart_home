[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_APP_ID,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_DATABASE_URL,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET"

# SPA fallback — send all routes to index.html so React Router handles them
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
